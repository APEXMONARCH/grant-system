<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Login | Grant Management System</title>
    <link rel="stylesheet" href="assets/css/styles.css">
    <link rel="stylesheet" href="assets/css/dark-mode.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-logo">
                    <i class="fas fa-hand-holding-heart"></i>
                    <h1>Grant System</h1>
                </div>
                <p class="auth-subtitle">Welcome back! Please login to your account</p>
            </div>

            <form id="loginForm" class="auth-form">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="your.email@example.com" required />
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" name="password" placeholder="Enter your password" required />
                        <button type="button" class="password-toggle" id="passwordToggle">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="form-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="rememberMe" name="rememberMe" />
                        <span>Remember me</span>
                    </label>
                </div>

                <button type="submit" class="btn btn-primary btn-large">Login</button>
            </form>

            <div class="auth-divider">
                <span>Don't have an account?</span>
            </div>

            <a href="signup.html" class="btn btn-secondary btn-large">Create Account</a>

            <div class="auth-footer">
                <a href="#" class="link-small">Forgot Password?</a>
            </div>
        </div>

        <div class="auth-background">
            <div class="bg-pattern"></div>
        </div>
    </div>

    <script src="assets/js/api.js"></script>
    <script src="assets/js/auth.js"></script>
    <script src="assets/js/app.js"></script>
    <script>
        // Redirect already-logged-in users
        if (Auth.isLoggedIn()) {
            window.location.href = Auth.isAdmin() ? 'index.html' : 'user-index.html';
        }

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const email    = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            const btn      = this.querySelector('[type="submit"]');

            if (!email || !password) { showAlert('Please fill in all fields.', 'warning'); return; }

            setLoading(btn, true, 'Logging in...');
            try {
                const user = await Auth.login(email, password);
                showAlert('Login successful!', 'success');
                setTimeout(() => {
                    window.location.href = user.role === 'admin' ? 'index.html' : 'user-index.html';
                }, 800);
            } catch (err) {
                showAlert(err.message || 'Invalid credentials. Please try again.', 'error');
                setLoading(btn, false);
            }
        });

        // Password toggle
        document.getElementById('passwordToggle').addEventListener('click', function() {
            const input = document.getElementById('password');
            const icon  = this.querySelector('i');
            const show  = input.type === 'password';
            input.type  = show ? 'text' : 'password';
            icon.classList.toggle('fa-eye', !show);
            icon.classList.toggle('fa-eye-slash', show);
        });
    </script>
</body>
</html>
