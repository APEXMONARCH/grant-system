<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Create Account | Grant Management System</title>
    <link rel="stylesheet" href="assets/css/styles.css">
    <link rel="stylesheet" href="assets/css/dark-mode.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .role-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: #eff6ff;
            color: var(--primary-blue, #1a56db);
            font-size: 0.78rem;
            font-weight: 600;
            padding: 4px 12px;
            border-radius: 20px;
            margin-bottom: 12px;
        }
        .admin-link-hint {
            text-align: center;
            margin-top: 14px;
            font-size: 0.85rem;
            color: var(--gray-500, #6b7280);
        }
        .admin-link-hint a {
            color: #7c3aed;
            font-weight: 500;
            text-decoration: none;
        }
        .admin-link-hint a:hover { text-decoration: underline; }
    </style>
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card auth-card-large">
            <div class="auth-header">
                <div class="auth-logo">
                    <i class="fas fa-hand-holding-heart"></i>
                    <h1>Grant System</h1>
                </div>
                <div class="role-badge">
                    <i class="fas fa-user"></i> Applicant Registration
                </div>
                <p class="auth-subtitle">Create your account to browse and apply for grants</p>
            </div>

            <form id="signupForm" class="auth-form">
                <div class="form-row">
                    <div class="form-group">
                        <label for="firstName">First Name</label>
                        <input type="text" id="firstName" name="firstName" placeholder="John" required />
                    </div>
                    <div class="form-group">
                        <label for="lastName">Last Name</label>
                        <input type="text" id="lastName" name="lastName" placeholder="Doe" required />
                    </div>
                </div>

                <div class="form-group">
                    <label for="signupEmail">Email Address</label>
                    <input type="email" id="signupEmail" name="email" placeholder="your.email@example.com" required />
                </div>

                <div class="form-group">
                    <label for="signupPassword">Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="signupPassword" name="password" placeholder="Create a strong password" required />
                        <button type="button" class="password-toggle" id="signupPasswordToggle">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <small class="form-hint">At least 6 characters</small>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm your password" required />
                        <button type="button" class="password-toggle" id="confirmPasswordToggle">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="form-group">
                    <label for="organization">Organization (Optional)</label>
                    <input type="text" id="organization" name="organization" placeholder="Your organization or institution" />
                </div>

                <div class="form-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="agreeTerms" name="agreeTerms" required />
                        <span>I agree to the Terms of Service and Privacy Policy</span>
                    </label>
                </div>

                <button type="submit" class="btn btn-primary btn-large" id="submitBtn">
                    <i class="fas fa-user-plus"></i> Create Account
                </button>
            </form>

            <div class="auth-divider">
                <span>Already have an account?</span>
            </div>

            <a href="login.html" class="btn btn-secondary btn-large">Sign In</a>

            <div class="admin-link-hint">
                Registering as an administrator? <a href="admin-signup.html"><i class="fas fa-shield-alt"></i> Admin Sign Up</a>
            </div>
        </div>

        <div class="auth-background">
            <div class="bg-pattern"></div>
        </div>
    </div>

    <script src="assets/js/api.js"></script>
    <script src="assets/js/auth.js"></script>
    <script src="assets/js/app.js"></script>
    <script src="assets/js/dark-mode.js"></script>
    <script>
        if (Auth.isLoggedIn()) {
            window.location.href = Auth.isAdmin() ? 'admin-dashboard.html' : 'user-index.html';
        }

        document.getElementById('signupForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const firstName       = document.getElementById('firstName').value.trim();
            const lastName        = document.getElementById('lastName').value.trim();
            const email           = document.getElementById('signupEmail').value.trim();
            const password        = document.getElementById('signupPassword').value.trim();
            const confirmPassword = document.getElementById('confirmPassword').value.trim();
            const organization    = document.getElementById('organization').value.trim();
            const agreeTerms      = document.getElementById('agreeTerms').checked;
            const btn             = document.getElementById('submitBtn');

            if (!firstName || !lastName || !email || !password || !confirmPassword) {
                showAlert('Please fill in all required fields.', 'warning'); return;
            }
            if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                showAlert('Please enter a valid email address.', 'warning'); return;
            }
            if (password.length < 6) {
                showAlert('Password must be at least 6 characters.', 'warning'); return;
            }
            if (password !== confirmPassword) {
                showAlert('Passwords do not match.', 'warning'); return;
            }
            if (!agreeTerms) {
                showAlert('Please agree to the Terms of Service.', 'warning'); return;
            }

            setLoading(btn, true, 'Creating account...');
            try {
                const user = await Auth.register({
                    first_name:   firstName,
                    last_name:    lastName,
                    email:        email,
                    password:     password,
                    organization: organization,
                    role:         'applicant',
                });
                showAlert('Account created! Welcome!', 'success');
                setTimeout(() => {
                    window.location.href = 'user-index.html';
                }, 1000);
            } catch (err) {
                showAlert(err.message || 'Registration failed.', 'error');
                if (err.errors) showFieldErrors(err.errors);
                setLoading(btn, false);
            }
        });

        // Password toggles
        ['signupPasswordToggle', 'confirmPasswordToggle'].forEach((btnId, i) => {
            const inputId = i === 0 ? 'signupPassword' : 'confirmPassword';
            document.getElementById(btnId)?.addEventListener('click', function() {
                const input = document.getElementById(inputId);
                const icon  = this.querySelector('i');
                const show  = input.type === 'password';
                input.type  = show ? 'text' : 'password';
                icon.classList.toggle('fa-eye', !show);
                icon.classList.toggle('fa-eye-slash', show);
            });
        });
    </script>
</body>
</html>
