<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Admin Registration | Grant Management System</title>
    <link rel="stylesheet" href="assets/css/styles.css">
    <link rel="stylesheet" href="assets/css/dark-mode.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="auth-page">
    <div class="auth-container" style="max-width:520px;">
        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-logo">
                    <i class="fas fa-shield-alt" style="color:#1a56db;"></i>
                    <h1>Admin Registration</h1>
                </div>
                <p class="auth-subtitle">Create an administrator account. You need the admin secret key to proceed.</p>
            </div>

            <div id="alertBox" style="display:none;margin-bottom:1rem;padding:.85rem 1rem;border-radius:8px;font-size:.9rem;font-weight:500;"></div>

            <form id="adminSignupForm" class="auth-form" autocomplete="off">
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
                    <div class="form-group">
                        <label for="firstName">First Name</label>
                        <input type="text" id="firstName" name="firstName" placeholder="First name" required />
                    </div>
                    <div class="form-group">
                        <label for="lastName">Last Name</label>
                        <input type="text" id="lastName" name="lastName" placeholder="Last name" required />
                    </div>
                </div>

                <div class="form-group">
                    <label for="adminEmail">Email Address</label>
                    <input type="email" id="adminEmail" name="email" placeholder="admin@example.com" required />
                </div>

                <div class="form-group">
                    <label for="adminPassword">Password <span style="color:#6b7280;font-weight:400;">(min. 8 characters)</span></label>
                    <div class="password-wrapper">
                        <input type="password" id="adminPassword" name="password" placeholder="Strong password" required />
                        <button type="button" class="password-toggle" id="passToggle1" aria-label="Toggle password visibility">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Repeat password" required />
                        <button type="button" class="password-toggle" id="passToggle2" aria-label="Toggle password visibility">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="form-group">
                    <label for="adminSecret">
                        <i class="fas fa-key" style="margin-right:4px;color:#f59e0b;"></i>
                        Admin Secret Key
                    </label>
                    <div class="password-wrapper">
                        <input type="password" id="adminSecret" name="admin_secret" placeholder="Enter the admin registration key" required />
                        <button type="button" class="password-toggle" id="passToggle3" aria-label="Toggle password visibility">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <small style="color:#6b7280;font-size:.8rem;margin-top:4px;display:block;">
                        This key is set in <code>api/config/constants.php</code> as <code>ADMIN_REGISTRATION_SECRET</code>.
                    </small>
                </div>

                <button type="submit" id="submitBtn" class="btn btn-primary btn-large">
                    <i class="fas fa-user-shield" style="margin-right:6px;"></i>Create Admin Account
                </button>
            </form>

            <div class="auth-divider">
                <span>Already have an account?</span>
            </div>
            <a href="login.html" class="btn btn-secondary btn-large">Sign In</a>

            <div class="auth-footer">
                <a href="signup.html" class="link-small">Register as Applicant instead</a>
            </div>
        </div>

        <div class="auth-background">
            <div class="bg-pattern"></div>
        </div>
    </div>

    <script src="assets/js/api.js"></script>
    <script src="assets/js/auth.js"></script>
    <script src="assets/js/app.js"></script>
    <script src="assets/js/dark-mode.js"></script>
    <script>
        // Redirect if already logged in
        if (Auth.isLoggedIn()) {
            window.location.href = Auth.isAdmin() ? 'admin-dashboard.html' : 'user-index.html';
        }

        function showAlert(msg, type) {
            const box = document.getElementById('alertBox');
            const colors = {
                success: { bg: '#d1fae5', color: '#065f46', border: '#10b981' },
                error:   { bg: '#fee2e2', color: '#7f1d1d', border: '#ef4444' },
                warning: { bg: '#fef3c7', color: '#78350f', border: '#f59e0b' },
            };
            const c = colors[type] || colors.warning;
            box.style.cssText = `display:block;background:${c.bg};color:${c.color};border:1px solid ${c.border};padding:.85rem 1rem;border-radius:8px;font-size:.9rem;font-weight:500;margin-bottom:1rem;`;
            box.textContent = msg;
        }

        function setLoading(btn, loading, label) {
            btn.disabled = loading;
            btn.innerHTML = loading
                ? `<i class="fas fa-spinner fa-spin" style="margin-right:6px;"></i>${label}`
                : `<i class="fas fa-user-shield" style="margin-right:6px;"></i>Create Admin Account`;
        }

        document.getElementById('adminSignupForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const firstName      = document.getElementById('firstName').value.trim();
            const lastName       = document.getElementById('lastName').value.trim();
            const email          = document.getElementById('adminEmail').value.trim();
            const password       = document.getElementById('adminPassword').value;
            const confirmPwd     = document.getElementById('confirmPassword').value;
            const adminSecret    = document.getElementById('adminSecret').value;
            const btn            = document.getElementById('submitBtn');

            if (!firstName || !lastName || !email || !password || !confirmPwd || !adminSecret) {
                showAlert('Please fill in all fields.', 'warning'); return;
            }
            if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                showAlert('Please enter a valid email address.', 'warning'); return;
            }
            if (password.length < 8) {
                showAlert('Admin password must be at least 8 characters.', 'warning'); return;
            }
            if (password !== confirmPwd) {
                showAlert('Passwords do not match.', 'warning'); return;
            }

            setLoading(btn, true, 'Creating admin account...');
            try {
                const res = await fetch(API.BASE_URL + '/auth/register-admin', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ first_name: firstName, last_name: lastName, email, password, admin_secret: adminSecret })
                });
                const data = await res.json();

                if (!data.success) {
                    const msg = data.errors
                        ? Object.values(data.errors).flat().join(' ')
                        : (data.message || 'Registration failed.');
                    showAlert(msg, 'error');
                    setLoading(btn, false);
                    return;
                }

                // Store token and user
                localStorage.setItem('auth_token', data.data.token);
                localStorage.setItem('auth_user', JSON.stringify(data.data.user));
                showAlert('Admin account created! Redirecting to dashboard...', 'success');
                setTimeout(() => { window.location.href = 'admin-dashboard.html'; }, 1000);

            } catch (err) {
                showAlert('Network error. Check that your PHP backend is running.', 'error');
                setLoading(btn, false);
            }
        });

        // Password toggles
        [['passToggle1','adminPassword'],['passToggle2','confirmPassword'],['passToggle3','adminSecret']].forEach(([btnId, inputId]) => {
            document.getElementById(btnId)?.addEventListener('click', function() {
                const input = document.getElementById(inputId);
                const icon  = this.querySelector('i');
                const show  = input.type === 'password';
                input.type  = show ? 'text' : 'password';
                icon.classList.toggle('fa-eye', !show);
                icon.classList.toggle('fa-eye-slash', show);
            });
        });
    </script>
</body>
</html>
