<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>My Applications | User Portal</title>
    <link rel="stylesheet" href="assets/css/styles.css">
    <link rel="stylesheet" href="assets/css/dark-mode.css">
    <link rel="stylesheet" href="assets/css/user-dashboard.css">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="user-shell" data-user-page="applications">
    <div class="app-container">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header"><div class="logo"><i class="fas fa-hand-holding-heart"></i><span>User Portal</span></div><button class="sidebar-toggle" id="sidebarToggle"><i class="fas fa-bars"></i></button></div>
            <nav class="sidebar-nav">
                <a href="user-index.html" class="nav-item"><i class="fas fa-gauge"></i><span>Dashboard</span></a>
                <a href="user-grants-browse.html" class="nav-item"><i class="fas fa-compass"></i><span>Browse Grants</span></a>
                <a href="user-apply-grant.html" class="nav-item"><i class="fas fa-pen-to-square"></i><span>Apply</span></a>
                <a href="user-applications.html" class="nav-item active"><i class="fas fa-folder-open"></i><span>My Applications</span></a>
                <a href="user-messages.html" class="nav-item"><i class="fas fa-envelope-open-text"></i><span>Messages</span></a>
                <a href="user-profile.html" class="nav-item"><i class="fas fa-user-gear"></i><span>Profile</span></a>
            </nav>
            <div class="sidebar-footer"><div class="user-info-mini"><i class="fas fa-user-circle"></i><span id="userMiniName">Applicant User</span></div></div>
        </aside>
        <div class="sidebar-overlay" id="sidebarOverlay"></div>

        <main class="main-content">
            <header class="topbar">
                <button class="mobile-menu-btn" id="mobileMenuBtn"><i class="fas fa-bars"></i></button>
                <h1 class="page-title">My Applications</h1>
                <div class="topbar-actions">
                    <button class="icon-btn" id="notificationBtn"><i class="fas fa-bell"></i><span class="badge" id="topNotificationCount">0</span></button>
                    <div class="profile-dropdown"><button class="profile-btn" id="profileBtn"><img class="avatar" id="topAvatar" src="https://ui-avatars.com/api/?name=Applicant+User&background=0b6bcb&color=fff" alt="Profile"><i class="fas fa-chevron-down"></i></button><div class="dropdown-menu" id="profileDropdown"><a href="user-profile.html"><i class="fas fa-user"></i> Profile</a><a href="user-messages.html"><i class="fas fa-envelope"></i> Messages</a><hr><a href="signup.html" onclick="handleLogout(event)"><i class="fas fa-sign-out-alt"></i> Logout</a></div></div>
                </div>
            </header>

            <div class="content-wrapper">
                <section class="card">
                    <div class="card-body user-toolbar">
                        <div class="user-form-group"><label for="applicationSearch">Search</label><input id="applicationSearch" placeholder="Search by grant"></div>
                        <div class="user-form-group"><label for="applicationStatus">Status</label><select id="applicationStatus"><option value="">All</option><option value="submitted">Submitted</option><option value="in-review">In Review</option><option value="approved">Approved</option><option value="rejected">Rejected</option></select></div>
                        <a href="user-apply-grant.html" class="btn btn-primary"><i class="fas fa-plus"></i> New</a>
                    </div>
                </section>
                <section class="card">
                    <div class="card-header"><h2>All Applications</h2></div>
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="data-table">
                                <thead><tr><th>Grant</th><th>Requested</th><th>Status</th><th>Date</th><th>Action</th></tr></thead>
                                <tbody id="applicationsRows"></tbody>
                            </table>
                        </div>
                    </div>
                </section>
            </div>
        </main>
    </div>
    <script src="assets/js/api.js"></script>
    <script src="assets/js/auth.js"></script>
    <script src="assets/js/app.js"></script>
    <script src="assets/js/dark-mode.js"></script>
    <script src="assets/js/user-dashboard.js"></script>
</body>
</html>
